<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Upload Test - MyTracksy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="photo-fix.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            background: #f8fafc;
        }
        
        .test-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-weight: 700;
            margin: 0 auto 2rem;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin: 0.5rem;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .btn-success { background: #10b981; }
        .btn-warning { background: #f59e0b; }
        .btn-danger { background: #ef4444; }
        
        .avatar-selector {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .avatar-selector-content {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
        }
        
        .avatar-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 1rem 0;
        }
        
        .avatar-option {
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .avatar-option:hover {
            border-color: #667eea;
            background: #f7fafc;
        }
        
        .avatar-option i {
            font-size: 2rem;
            color: #667eea;
        }
        
        .log {
            background: #1a202c;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>📸 Photo Upload Test</h1>
        <p>This page tests the photo upload functionality with debugging.</p>
        
        <!-- Profile Avatar (same structure as user-profile.html) -->
        <div class="profile-avatar" id="profileAvatar" onclick="openPhotoSelectorFixed()">
            <img id="profileImage" src="" alt="Profile Picture" style="display: none;">
            <i class="fas fa-user" id="defaultAvatar"></i>
        </div>
        
        <!-- Avatar Selector Modal -->
        <div class="avatar-selector" id="avatarSelector" onclick="closePhotoSelectorFixed()">
            <div class="avatar-selector-content" onclick="event.stopPropagation()">
                <h3>Choose Avatar or Upload Photo</h3>
                <div class="avatar-options">
                    <div class="avatar-option" onclick="selectAvatarFixed('fas fa-user')">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="avatar-option" onclick="selectAvatarFixed('fas fa-user-tie')">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <div class="avatar-option" onclick="selectAvatarFixed('fas fa-user-graduate')">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div class="avatar-option" onclick="selectAvatarFixed('fas fa-user-astronaut')">
                        <i class="fas fa-user-astronaut"></i>
                    </div>
                    <div class="avatar-option" onclick="selectAvatarFixed('fas fa-user-ninja')">
                        <i class="fas fa-user-ninja"></i>
                    </div>
                    <div class="avatar-option" onclick="selectAvatarFixed('fas fa-user-md')">
                        <i class="fas fa-user-md"></i>
                    </div>
                </div>
                <div class="photo-upload-section">
                    <input type="file" id="photoUpload" accept="image/*" onchange="uploadPhotoFixed(this)" style="display: none;">
                    <button class="btn" onclick="document.getElementById('photoUpload').click()">
                        <i class="fas fa-upload"></i>
                        Upload Photo
                    </button>
                </div>
                <button class="btn btn-danger" onclick="closePhotoSelectorFixed()">
                    <i class="fas fa-times"></i>
                    Close
                </button>
            </div>
        </div>
        
        <!-- Test Buttons -->
        <div style="text-align: center; margin: 2rem 0;">
            <button class="btn" onclick="openPhotoSelectorFixed()">
                📂 Open Photo Selector
            </button>
            <button class="btn btn-success" onclick="photoDebug.testPhoto()">
                🧪 Test Photo
            </button>
            <button class="btn btn-warning" onclick="photoDebug.testAvatar()">
                👤 Test Avatar
            </button>
            <button class="btn btn-danger" onclick="photoDebug.clearPhoto()">
                🗑️ Clear Photo
            </button>
        </div>
        
        <!-- Debug Info -->
        <div style="text-align: center; margin: 2rem 0;">
            <button class="btn" onclick="showDebugInfo()">
                🔍 Show Debug Info
            </button>
            <button class="btn" onclick="clearLog()">
                🧹 Clear Log
            </button>
        </div>
        
        <!-- Console Log -->
        <div class="log" id="logContainer">
            <div>📋 Debug Console - Click buttons above to test functionality</div>
        </div>
    </div>
    
    <script>
        // Override console.log to show in page
        const originalLog = console.log;
        const logContainer = document.getElementById('logContainer');
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            const logEntry = document.createElement('div');
            logEntry.textContent = args.join(' ');
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        };
        
        function showDebugInfo() {
            console.log('=== DEBUG INFO ===');
            photoDebug.checkElements();
            photoDebug.checkStorage();
            console.log('==================');
        }
        
        function clearLog() {
            logContainer.innerHTML = '<div>📋 Debug Console - Log cleared</div>';
        }
        
        // Show notification function for the fix
        function showPersonalTaxNotification(message, type) {
            console.log(`🔔 ${type.toUpperCase()}: ${message}`);
        }
        
        console.log('🚀 Photo Test Page Loaded');
    </script>
</body>
</html>
