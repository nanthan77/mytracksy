<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTracksy Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1e293b;
            --secondary-color: #475569;
            --accent-color: #0ea5e9;
            --success-color: #10b981;
            --error-color: #ef4444;
            --bg-color: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            position: relative;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: var(--primary-color);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--secondary-color);
            font-size: 1rem;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-color) 0%, #0284c7 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f8fafc;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            background: white;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--secondary-color);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: var(--accent-color);
        }

        .login-btn {
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent-color) 0%, #0284c7 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .security-info {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            color: #0369a1;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }

        .back-link {
            position: absolute;
            top: 1rem;
            left: 1rem;
            color: var(--secondary-color);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--accent-color);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem;
                margin: 1rem;
            }

            .login-header h1 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Main Site
        </a>

        <div class="login-header">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>Admin Access</h1>
            <p>Secure administrator login for MyTracksy</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label for="adminEmail" class="form-label">Administrator Email</label>
                <input 
                    type="email" 
                    id="adminEmail" 
                    class="form-input" 
                    placeholder="admin@mytracksy.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="adminPassword" class="form-label">Password</label>
                <div class="password-container">
                    <input 
                        type="password" 
                        id="adminPassword" 
                        class="form-input" 
                        placeholder="Enter your admin password"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <i class="fas fa-eye" id="passwordIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span id="loginText">Access Admin Panel</span>
                <span id="loginSpinner" class="spinner" style="display: none;"></span>
            </button>
        </form>

        <div class="security-info">
            <i class="fas fa-lock"></i>
            This is a secure area. All access attempts are logged and monitored.
        </div>
    </div>

    <script>
        // Admin login credentials (in production, this should be server-side)
        const ADMIN_CREDENTIALS = {
            'admin@mytracksy.com': 'MyTracksyAdmin2024!',
            'superadmin@mytracksy.com': 'SuperAdmin2024!',
            'support@mytracksy.com': 'SupportAdmin2024!'
        };

        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            
            // Show loading state
            setLoadingState(true);
            hideMessages();
            
            try {
                // Simulate authentication delay
                await new Promise(resolve => setTimeout(resolve, 1500));
                
                // Validate credentials
                if (ADMIN_CREDENTIALS[email] && ADMIN_CREDENTIALS[email] === password) {
                    // Successful login
                    await handleSuccessfulLogin(email);
                } else {
                    // Failed login
                    handleFailedLogin();
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('An unexpected error occurred. Please try again.');
            } finally {
                setLoadingState(false);
            }
        });

        async function handleSuccessfulLogin(email) {
            // Generate admin token
            const adminToken = generateAdminToken(email);
            
            // Store authentication data
            localStorage.setItem('mytracksy_admin_access', 'true');
            localStorage.setItem('mytracksy_admin_token', adminToken);
            localStorage.setItem('mytracksy_admin_user', JSON.stringify({
                email: email,
                loginTime: new Date().toISOString(),
                role: getAdminRole(email)
            }));
            
            // Show success message
            showSuccess('Login successful! Redirecting to admin panel...');
            
            // Log the login attempt
            logAdminActivity(`Admin login successful: ${email}`);
            
            // Redirect to admin panel
            setTimeout(() => {
                window.location.href = 'admin-panel.html';
            }, 2000);
        }

        function handleFailedLogin() {
            showError('Invalid credentials. Please check your email and password.');
            logAdminActivity(`Failed admin login attempt: ${document.getElementById('adminEmail').value}`);
            
            // Clear password field
            document.getElementById('adminPassword').value = '';
        }

        function generateAdminToken(email) {
            const timestamp = Date.now();
            const random = Math.random().toString(36).substring(2);
            return `admin_${btoa(email)}_${timestamp}_${random}`;
        }

        function getAdminRole(email) {
            if (email === 'superadmin@mytracksy.com') return 'superadmin';
            if (email === 'support@mytracksy.com') return 'support';
            return 'admin';
        }

        function setLoadingState(loading) {
            const btn = document.getElementById('loginBtn');
            const text = document.getElementById('loginText');
            const spinner = document.getElementById('loginSpinner');
            
            if (loading) {
                btn.disabled = true;
                text.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                btn.disabled = false;
                text.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        function togglePassword() {
            const passwordInput = document.getElementById('adminPassword');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                passwordIcon.className = 'fas fa-eye';
            }
        }

        function logAdminActivity(message) {
            const logs = JSON.parse(localStorage.getItem('mytracksy_admin_logs') || '[]');
            const timestamp = new Date().toISOString();
            
            logs.unshift({
                timestamp: timestamp,
                message: message,
                ip: 'xxx.xxx.xxx.xxx', // In production, get real IP
                userAgent: navigator.userAgent
            });
            
            // Keep only last 500 login attempts
            if (logs.length > 500) {
                logs.splice(500);
            }
            
            localStorage.setItem('mytracksy_admin_logs', JSON.stringify(logs));
        }

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            const isLoggedIn = localStorage.getItem('mytracksy_admin_access');
            const adminToken = localStorage.getItem('mytracksy_admin_token');
            
            if (isLoggedIn && adminToken) {
                // Verify token is still valid (basic check)
                const tokenParts = adminToken.split('_');
                if (tokenParts.length >= 3) {
                    const timestamp = parseInt(tokenParts[2]);
                    const now = Date.now();
                    const tokenAge = now - timestamp;
                    
                    // Token valid for 24 hours
                    if (tokenAge < 24 * 60 * 60 * 1000) {
                        window.location.href = 'admin-panel.html';
                        return;
                    }
                }
                
                // Token expired, clear storage
                localStorage.removeItem('mytracksy_admin_access');
                localStorage.removeItem('mytracksy_admin_token');
                localStorage.removeItem('mytracksy_admin_user');
            }
        });

        // Security: Prevent password managers from auto-filling
        setTimeout(() => {
            document.getElementById('adminPassword').setAttribute('autocomplete', 'off');
        }, 1000);
    </script>
</body>
</html>
