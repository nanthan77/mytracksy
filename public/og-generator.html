<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTracksy OG Image Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 1400px;
        }

        h1 {
            margin-bottom: 30px;
            color: #0f172a;
            text-align: center;
            font-size: 28px;
        }

        .og-card {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0f172a 0%, #1a2847 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .og-content {
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
            position: relative;
            z-index: 2;
        }

        .og-logo {
            font-size: 48px;
            font-weight: 800;
            color: white;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .og-logo span {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .og-tagline {
            font-size: 36px;
            font-weight: 700;
            color: white;
            line-height: 1.3;
            margin-bottom: 20px;
            max-width: 800px;
        }

        .og-subtext {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
            max-width: 700px;
        }

        .og-accent-bar {
            height: 8px;
            background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 50%, #06b6d4 100%);
            margin-top: auto;
            position: relative;
            z-index: 2;
        }

        .og-pattern {
            position: absolute;
            top: 0;
            right: 0;
            width: 400px;
            height: 400px;
            opacity: 0.08;
            pointer-events: none;
        }

        .circle-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 2px solid white;
            border-radius: 50%;
            top: -50px;
            right: -50px;
        }

        .circle-2 {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid white;
            border-radius: 50%;
            bottom: 50px;
            right: 200px;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        button.secondary {
            background: transparent;
            border: 2px solid #4f46e5;
            color: #4f46e5;
        }

        button.secondary:hover {
            background: rgba(79, 70, 229, 0.1);
        }

        .info {
            margin-top: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 1300px) {
            .og-card {
                width: 100%;
                max-width: 1200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MyTracksy OG Image Generator</h1>
        
        <div class="og-card" id="ogCard">
            <div class="og-pattern">
                <div class="circle-1"></div>
                <div class="circle-2"></div>
            </div>
            
            <div class="og-content">
                <div class="og-logo">My<span>Tracksy</span></div>
                <div class="og-tagline">Professional Finance & Workflow Software for Sri Lanka</div>
                <div class="og-subtext">Designed for medical, legal, business, engineering, creative, and studio professionals</div>
            </div>

            <div class="og-accent-bar"></div>
        </div>

        <div class="controls">
            <button onclick="downloadImage()">Download as PNG</button>
            <button class="secondary" onclick="copyToClipboard()">Copy Card</button>
        </div>

        <div class="info">
            Dimensions: 1200x630px (perfect for Open Graph)<br>
            Right-click the card and select "Save image as" to download manually
        </div>
    </div>

    <script>
        async function downloadImage() {
            const card = document.getElementById('ogCard');
            
            try {
                const canvas = await html2canvas(card, {
                    width: 1200,
                    height: 630,
                    scale: 2,
                    backgroundColor: null,
                });

                const link = document.createElement('a');
                link.href = canvas.toDataURL('image/png');
                link.download = 'mytracksy-og-main.png';
                link.click();
            } catch (error) {
                alert('Please install html2canvas library or use browser screenshot tool');
                console.error(error);
            }
        }

        function copyToClipboard() {
            const card = document.getElementById('ogCard');
            const html = card.outerHTML;
            navigator.clipboard.writeText(html).then(() => {
                alert('Card HTML copied to clipboard!');
            });
        }

        // Fallback: Add instructions for manual screenshot
        window.addEventListener('load', () => {
            console.log('%cMyTracksy OG Image Generator', 'font-size: 20px; font-weight: bold; color: #4f46e5;');
            console.log('%cTo download: Use browser DevTools to screenshot the card, or right-click and "Save image as"', 'color: #666;');
            console.log('%cDimensions: 1200x630px', 'color: #666;');
        });
    </script>
</body>
</html>
