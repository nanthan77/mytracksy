<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTracksy - Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        .container { max-width: 400px; margin: 50px auto; background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px 20px; text-align: center; }
        .header h1 { font-size: 28px; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .content { padding: 30px 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input { width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #667eea; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; font-weight: 500; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; text-align: center; background: #f8f9fa; border: none; cursor: pointer; font-weight: 600; }
        .tab.active { background: #667eea; color: white; }
        .form { display: none; }
        .form.active { display: block; }
        .user-info { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .logout-btn { background: #dc3545; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MyTracksy</h1>
            <p>Personal Expense Tracker</p>
        </div>
        
        <div class="content">
            <!-- Authentication Section -->
            <div id="auth-section">
                <div class="tabs">
                    <button class="tab active" onclick="showTab('login')">Login</button>
                    <button class="tab" onclick="showTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <div id="login-form" class="form active">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="login-email" value="test@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" value="password123">
                    </div>
                    <button class="btn" onclick="handleLogin()">Sign In</button>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="register-name" value="Test User">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="register-email" value="">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="register-password" value="">
                    </div>
                    <button class="btn" onclick="handleRegister()">Create Account</button>
                </div>
            </div>

            <!-- App Section (shown after login) -->
            <div id="app-section" style="display: none;">
                <div class="user-info">
                    <h3>Welcome, <span id="user-name"></span>!</h3>
                    <p>Email: <span id="user-email"></span></p>
                    <button class="btn logout-btn" onclick="handleLogout()">Logout</button>
                </div>
                
                <h3>Quick Actions</h3>
                <button class="btn" style="margin: 10px 0;" onclick="alert('Add Expense feature coming soon!')">Add Expense</button>
                <button class="btn" style="margin: 10px 0;" onclick="alert('View Budget feature coming soon!')">View Budget</button>
                <button class="btn" style="margin: 10px 0;" onclick="alert('Analytics feature coming soon!')">View Analytics</button>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBnRy9L2hMx12QvraOOeK49ZbaaHFUV6uQ",
            authDomain: "tracksy-8e30c.firebaseapp.com",
            projectId: "tracksy-8e30c",
            storageBucket: "tracksy-8e30c.firebasestorage.app",
            messagingSenderId: "941924690758",
            appId: "1:941924690758:web:ac3e5c4fc9aac58a5c9347",
            measurementId: "G-FH9Q1PGV0H"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Show message
        function showMessage(text, type = 'error') {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => messageDiv.innerHTML = '', 5000);
        }

        // Show different sections
        function showAuthSection() {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('app-section').style.display = 'none';
        }

        function showAppSection(user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('user-name').textContent = user.displayName || 'User';
            document.getElementById('user-email').textContent = user.email;
        }

        // Tab switching
        window.showTab = function(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.form').forEach(form => form.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + '-form').classList.add('active');
        };

        // Authentication functions
        window.handleLogin = async function() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showMessage('Please fill in all fields');
                return;
            }

            try {
                const result = await signInWithEmailAndPassword(auth, email, password);
                showMessage('Login successful!', 'success');
                showAppSection(result.user);
            } catch (error) {
                showMessage('Login failed: ' + error.message);
            }
        };

        window.handleRegister = async function() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            if (!name || !email || !password) {
                showMessage('Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters');
                return;
            }

            try {
                const result = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(result.user, { displayName: name });
                showMessage('Account created successfully!', 'success');
                showAppSection(result.user);
            } catch (error) {
                showMessage('Registration failed: ' + error.message);
            }
        };

        window.handleLogout = async function() {
            try {
                await signOut(auth);
                showMessage('Logged out successfully', 'success');
                showAuthSection();
            } catch (error) {
                showMessage('Logout failed: ' + error.message);
            }
        };

        // Listen for auth state changes
        onAuthStateChanged(auth, (user) => {
            if (user) {
                showAppSection(user);
            } else {
                showAuthSection();
            }
        });

        console.log('MyTracksy app initialized');
    </script>
</body>
</html>
